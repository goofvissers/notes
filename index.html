<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goof Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="mode-rail glass-panel" aria-label="Navigation mode">
        <div class="mode-rail-top">
          <button class="rail-button is-active" id="mode-notes-button" type="button" aria-label="Show notes" title="Notes">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 4.5h7l3.5 3.5V19a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 5.5 19V6A1.5 1.5 0 0 1 7 4.5Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
              <path d="M14 4.5V8h3.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
              <path d="M8.5 11h6.5M8.5 14h6.5M8.5 17h5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
            </svg>
          </button>

          <button class="rail-button" id="mode-tags-button" type="button" aria-label="Show tags" title="Tags">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M11 4.5H6A1.5 1.5 0 0 0 4.5 6v5.2a2 2 0 0 0 .6 1.4l6.8 6.8a1.5 1.5 0 0 0 2.1 0l5.4-5.4a1.5 1.5 0 0 0 0-2.1l-6.8-6.8a2 2 0 0 0-1.4-.6Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
              <circle cx="8.5" cy="8.5" r="1.2" fill="currentColor" />
            </svg>
          </button>
        </div>

        <div class="mode-rail-bottom">
          <img class="rail-logo" src="assets/logo_notes_goof.png" alt="Goof Notes" />
        </div>
      </aside>

      <aside class="browser-pane glass-panel">
        <div class="browser-top">
          <div class="brand-block">
            <img class="brand-mark" src="assets/logo_notes_goof.png" alt="Goof Notes logo" />
            <div class="brand-copy">
              <h1 id="browser-title">Notes</h1>
              <p id="browser-count">0 notes</p>
            </div>
          </div>

          <div class="browser-actions">
            <button class="primary-button" id="new-note-button" type="button">
              New note
            </button>
          </div>
        </div>

        <label class="search-field" for="search-input">
          <span id="search-label">Search notes or tags</span>
          <input
            id="search-input"
            type="search"
            placeholder="Design, ideas, meeting..."
            autocomplete="off"
          />
        </label>

        <div class="notes-toolbar" id="notes-toolbar">
          <p id="notes-count">Library</p>
          <button class="ghost-button" id="delete-note-button" type="button">
            Delete
          </button>
        </div>

        <div class="notes-columns" id="notes-columns">
          <button class="column-button" id="sort-title-button" type="button">
            Title
          </button>
          <button class="column-button" id="sort-tag-button" type="button">
            Tags
          </button>
        </div>

        <div class="browser-list" id="browser-list" aria-live="polite"></div>
      </aside>

      <div
        class="pane-resizer"
        id="pane-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize browser panel"
      ></div>

      <main class="editor-area">
        <section class="editor-card glass-panel">
          <div class="editor-topbar">
            <div>
              <p class="eyebrow">Current note</p>
              <h3 id="note-status">Ready to write</h3>
            </div>
            <div class="editor-meta">
              <button class="ghost-button subtle-button" id="open-data-folder-inline" type="button">
                Open data folder
              </button>
              <p class="timestamp" id="updated-at">Saved locally</p>
            </div>
          </div>

          <label class="field">
            <span>Title</span>
            <input
              id="note-title"
              type="text"
              maxlength="120"
              placeholder="Give this note a clear title"
              autocomplete="off"
            />
          </label>

          <label class="field">
            <span>Content</span>
            <textarea
              id="note-body"
              rows="10"
              placeholder="Write your note here..."
            ></textarea>
          </label>

          <div class="tags-panel">
            <div class="field">
              <span>Tags</span>
              <div class="tag-input-row">
                <div class="tag-input-wrap">
                  <input
                    id="tag-input"
                    type="text"
                    placeholder="Type a tag and press Add"
                    autocomplete="off"
                    aria-autocomplete="list"
                    aria-expanded="false"
                    aria-controls="tag-suggestion-list"
                  />
                  <div class="tag-suggestions is-hidden" id="tag-suggestions">
                    <div class="tag-suggestion-list" id="tag-suggestion-list" role="listbox"></div>
                  </div>
                </div>
                <button class="secondary-button" id="add-tag-button" type="button">
                  Add tag
                </button>
              </div>
            </div>
            <div class="tag-list" id="tag-list" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="note-item-template">
      <button class="note-item" type="button">
        <span class="note-item-title"></span>
        <div class="note-item-tags"></div>
      </button>
    </template>

    <template id="tag-item-template">
      <button class="tag-browser-item" type="button">
        <div class="tag-browser-row">
          <strong class="tag-browser-name"></strong>
          <span class="tag-browser-count"></span>
        </div>
      </button>
    </template>

    <template id="tag-note-group-template">
      <section class="tag-note-group">
        <div class="tag-note-header">
          <div>
            <p class="eyebrow">Selected tag</p>
            <h2 class="tag-focus-title"></h2>
          </div>
          <span class="tag-focus-count"></span>
        </div>
        <div class="tag-note-list"></div>
      </section>
    </template>

    <template id="tag-pill-template">
      <span class="tag-pill">
        <span class="tag-label"></span>
        <button class="tag-remove" type="button" aria-label="Remove tag">x</button>
      </span>
    </template>

    <script src="app.js"></script>
  </body>
</html>
