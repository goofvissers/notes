<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goof Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar glass-panel">
        <div class="sidebar-top">
          <div class="brand-block">
            <img class="brand-mark" src="assets/logo_notes_goof.png" alt="Goof Notes logo" />
            <div class="brand-copy">
              <h1>Goof Notes</h1>
              <p id="notes-count-inline">0 notes</p>
            </div>
          </div>

          <div class="sidebar-actions">
            <button class="primary-button" id="new-note-button" type="button">
              New note
            </button>
          </div>
        </div>

        <label class="search-field" for="search-input">
          <span>Search notes or tags</span>
          <input
            id="search-input"
            type="search"
            placeholder="Design, ideas, meeting..."
            autocomplete="off"
          />
        </label>

        <div class="notes-toolbar">
          <p id="notes-count">Library</p>
          <button class="ghost-button" id="delete-note-button" type="button">
            Delete
          </button>
        </div>

        <div class="notes-columns">
          <button class="column-button" id="sort-title-button" type="button">
            Title
          </button>
          <button class="column-button" id="sort-tag-button" type="button">
            Tags
          </button>
        </div>

        <div class="notes-list" id="notes-list" aria-live="polite"></div>
      </aside>

      <div
        class="pane-resizer"
        id="pane-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize library panel"
      ></div>

      <main class="editor-area">
        <section class="editor-card glass-panel">
          <div class="editor-topbar">
            <div>
              <p class="eyebrow">Current note</p>
              <h3 id="note-status">Ready to write</h3>
            </div>
            <div class="editor-meta">
              <button class="ghost-button subtle-button" id="open-data-folder-inline" type="button">
                Open data folder
              </button>
              <p class="timestamp" id="updated-at">Saved locally</p>
            </div>
          </div>

          <label class="field">
            <span>Title</span>
            <input
              id="note-title"
              type="text"
              maxlength="120"
              placeholder="Give this note a clear title"
              autocomplete="off"
            />
          </label>

          <label class="field">
            <span>Content</span>
            <textarea
              id="note-body"
              rows="14"
              placeholder="Write your note here..."
            ></textarea>
          </label>

          <div class="tags-panel">
            <div class="field">
              <span>Tags</span>
              <div class="tag-input-row">
                <input
                  id="tag-input"
                  type="text"
                  placeholder="Type a tag and press Add"
                  autocomplete="off"
                />
                <button class="secondary-button" id="add-tag-button" type="button">
                  Add tag
                </button>
              </div>
            </div>
            <div class="tag-list" id="tag-list" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="note-item-template">
      <button class="note-item" type="button">
        <span class="note-item-title"></span>
        <div class="note-item-tags"></div>
      </button>
    </template>

    <template id="tag-pill-template">
      <span class="tag-pill">
        <span class="tag-label"></span>
        <button class="tag-remove" type="button" aria-label="Remove tag">x</button>
      </span>
    </template>

    <script src="app.js"></script>
  </body>
</html>
